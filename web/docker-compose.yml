# Self-hosted stack: Next.js (web) + Postgres (db). Run on your own server with:
#   cp .env.example .env   # then fill in the secrets
#   docker compose up -d --build
#
# Postgres data persists in the named `pgdata` volume; the schema in ./db/init runs
# once on first boot. The web container talks to the db container over the internal
# Docker network (DATABASE_URL points at host `db`).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Postgres is NOT published to the host by default — `web` reaches it over the
    # internal compose network (db:5432), so it never conflicts and isn't exposed.
    # Only uncomment if you want to connect from the host (psql/DBeaver/pgAdmin).
    # Fixed high port bound to 127.0.0.1; override with DB_PORT in .env.
    # ports:
    #   - "127.0.0.1:${DB_PORT:-29315}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # App sits behind nginx, so it listens on a fixed high port (not 3000, to
      # avoid clashes with other stacks). Bound to 127.0.0.1 — nginx is the only
      # public entrypoint; the app port itself isn't exposed. Override with
      # WEB_PORT in .env. If nginx runs in a container or on another host, change
      # 127.0.0.1 to 0.0.0.0 (or the right interface).
      - "127.0.0.1:${WEB_PORT:-29314}:3000"
    env_file:
      - .env
    environment:
      # Always talk to the db service inside the compose network; overrides any
      # DATABASE_URL in .env so the user doesn't have to know the internal host.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  pgdata:
